<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iceland — Visual Storyboard — The Bald Dude Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1c1c1c;
    --surface3: #242424;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #ff4f42;
    --accent-dim: rgba(255,79,66,0.1);
    --accent-border: rgba(255,79,66,0.25);
    --white: #f5f4f0;
    --mid: rgba(245,244,240,0.5);
    --dim: rgba(245,244,240,0.2);
    --mono: 'DM Mono', monospace;
    --sans: 'Open Sans', sans-serif;
    /* Legacy var aliases */
    --paper: #0d0d0d;
    --cream: #141414;
    --card: #1c1c1c;
    --ink: #f5f4f0;
    --warm-dark: #0d0d0d;
    --muted: rgba(245,244,240,0.45);
    --rule: rgba(255,255,255,0.08);
    --amber: #ff4f42;
    --amber-bright: #ff4f42;
    --amber-glow: rgba(255,79,66,0.1);
    --amber-border: rgba(255,79,66,0.25);
    --amber-dim: rgba(255,79,66,0.08);
    --gold: #ff4f42;
    --gold-bright: #ff4f42;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }
  header {
    padding: 48px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }
  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 7vw, 96px);
    letter-spacing: 0.04em;
    color: var(--white);
    line-height: 0.9;
  }
  .header-left .subtitle {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,244,240,0.45);
  }
  .header-right { text-align: right; flex-shrink: 0; }
  .header-right .stat {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: rgba(245,244,240,0.45);
    text-transform: uppercase;
  }
  .header-right .stat span {
    color: var(--accent);
    font-size: 28px;
    display: block;
    line-height: 1;
  }
  .timeline-bar {
    padding: 0 48px;
    margin: 24px 0;
    display: flex;
    align-items: center;
    height: 4px;
  }
  .tl-segment {
    height: 4px;
    flex: 1;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }
  .tl-segment.active { background: var(--accent); }
  .tl-segment:hover { background: var(--accent2); }
  .tl-segment + .tl-segment { margin-left: 2px; }
  .grid {
    padding: 0 48px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .shot-card {
    background: var(--bg);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .shot-card:hover { z-index: 10; }
  .shot-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: #05050a;
  }
  .shot-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s;
    filter: saturate(0.85) brightness(0.9);
    display: block;
  }
  .shot-card:hover .shot-img {
    transform: scale(1.06);
    filter: saturate(1.05) brightness(1.0);
  }
  .timecode {
    position: absolute;
    top: 10px;
    left: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--white);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    padding: 3px 7px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .shot-number {
    position: absolute;
    top: 10px;
    right: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .overlay-text {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 12px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .shot-card:hover .overlay-text { opacity: 1; transform: translateY(0); }
  .shot-info { padding: 14px 16px 16px; border-top: 1px solid var(--border); }
  .shot-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.06em;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .shot-desc { font-size: 9.5px; line-height: 1.6; color: rgba(245,244,240,0.45); font-weight: 300; }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    backdrop-filter: blur(8px);
    padding: 40px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; align-items: center; justify-content: center; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    max-width: 960px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr;
    position: relative;
  }
  .modal-img-side { position: relative; overflow: hidden; aspect-ratio: 16/9; }
  .modal-img-side img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal-content {
    padding: 32px 40px 40px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 24px;
    align-items: start;
  }
  .shot-num-lg {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: var(--border);
    line-height: 1;
    letter-spacing: 0.02em;
  }
  .modal-text .modal-tc {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .modal-text .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--white);
    letter-spacing: 0.04em;
    margin-bottom: 12px;
    line-height: 1;
  }
  .modal-text .modal-desc { font-size: 13px; line-height: 1.8; color: var(--text); font-weight: 300; }
  .modal-caption {
    grid-column: 1 / -1;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: 1px solid var(--border);
    color: rgba(245,244,240,0.45);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s;
  }
  .modal-close:hover { color: var(--white); border-color: var(--white); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    header { padding: 24px; flex-direction: column; align-items: flex-start; }
    .grid { padding: 0 0 80px; grid-template-columns: 1fr; }
    .timeline-bar { padding: 0 24px; }
  }

  /* ═══ SITE STYLE OVERRIDES ═══ */
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap');

  * { cursor: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij4KICA8cGF0aCBkPSJNNCAyIEw0IDIwIEw4LjUgMTUuNSBMMTIuNSAyMiBMMTUgMjEgTDExIDE0LjUgTDE3IDE0LjUgWiIgCiAgICAgICAgZmlsbD0iI2ZmNGY0MiIgc3Ryb2tlPSIjMGQwZDBkIiBzdHJva2Utd2lkdGg9IjAuNSIvPgo8L3N2Zz4=') 4 2, auto; }

  body {
    background: #0d0d0d !important;
    color: #f5f4f0 !important;
    font-family: 'Open Sans', sans-serif !important;
    padding-top: 80px;
    padding-bottom: 60px;
  }

  /* Cover section - keep dark, just retheme */
  .cover, [class*="cover"], .hero, [class*="hero"] {
    background: #0d0d0d !important;
  }
  .cover-noise, .cover-dots, [class*="noise"], [class*="dots"], [class*="grain"] {
    display: none !important;
  }

  /* Page/content areas */
  .page, [class*="page"], .content, [class*="content"], .main {
    background: #0d0d0d !important;
    color: #f5f4f0 !important;
  }

  /* Cards and boxes */
  .card, [class*="card"], [class*="box"], [class*="block"],
  [class*="step"], [class*="setup"], [class*="hack"],
  [class*="shot"], [class*="section-box"] {
    background: #141414 !important;
    border-color: rgba(255,255,255,0.1) !important;
    color: #f5f4f0 !important;
  }

  /* Gear cards */
  .gear-card, [class*="gear-card"] {
    background: #141414 !important;
    border: .5px solid rgba(255,255,255,0.1) !important;
  }

  /* All text */
  p, li, td, th, span, div, label {
    color: rgba(245,244,240,0.55) !important;
  }
  h1, h2, h3, h4, h5 {
    color: #f5f4f0 !important;
    font-family: 'Open Sans', sans-serif !important;
    font-weight: 300 !important;
  }
  strong, b { color: #f5f4f0 !important; }
  em { color: #ff4f42 !important; font-style: italic; }

  /* Accent elements */
  [class*="overline"], [class*="eyebrow"], [class*="label"],
  [class*="cat"], [class*="num"], [class*="tag"],
  [class*="accent"], [class*="highlight"] {
    color: #ff4f42 !important;
  }

  /* Tables */
  table { border-collapse: collapse; width: 100%; }
  th {
    background: #141414 !important;
    color: #ff4f42 !important;
    border-color: rgba(255,255,255,0.1) !important;
    font-family: 'DM Mono', monospace !important;
    font-size: 10px !important;
    letter-spacing: .12em !important;
    text-transform: uppercase !important;
    font-weight: 400 !important;
  }
  td {
    border-color: rgba(255,255,255,0.07) !important;
    color: rgba(245,244,240,0.5) !important;
  }
  tr:hover td { color: #f5f4f0 !important; }

  /* Dividers */
  hr, [class*="divider"], [class*="rule"] {
    border-color: rgba(255,255,255,0.07) !important;
    background: rgba(255,255,255,0.07) !important;
  }

  /* Links */
  a { color: #ff4f42 !important; }
  a:hover { opacity: .75; }

  /* Borders */
  [style*="border"] {
    border-color: rgba(255,255,255,0.1) !important;
  }

  /* Featured/highlighted cards */
  .featured, [class*="featured"], [class*="active"] {
    border-color: #ff4f42 !important;
    background: rgba(255,79,66,0.06) !important;
  }

  /* Monospace elements */
  code, pre, [class*="mono"], [class*="code"] {
    font-family: 'DM Mono', monospace !important;
    color: #ff4f42 !important;
    background: #141414 !important;
  }

  /* Pills / tags */
  .ctag, [class*="pill"], [class*="badge"], [class*="chip"] {
    border-color: rgba(255,255,255,0.1) !important;
    color: rgba(245,244,240,0.4) !important;
    background: transparent !important;
  }
  .ctag.hi, [class*="pill"].hi, [class*="badge"].active {
    border-color: rgba(255,79,66,0.3) !important;
    color: #ff4f42 !important;
    background: rgba(255,79,66,0.08) !important;
  }

  /* Cover title */
  .cover-title, h1.cover-title {
    color: #f5f4f0 !important;
    font-family: 'Open Sans', sans-serif !important;
  }
  .cover-title em { color: #ff4f42 !important; }

  /* Diagram wrappers */
  [class*="diagram"], [class*="layout"], [class*="grid-wrap"] {
    background: #141414 !important;
    border: .5px solid rgba(255,255,255,0.08) !important;
  }

  /* SVG overrides */
  svg text { fill: rgba(245,244,240,0.7) !important; }
  svg [class*="label"] text { fill: rgba(245,244,240,0.5) !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0d0d0d; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

</style>
</head>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  if(!nav) return;
  // Start with no background
  nav.style.background = 'transparent';
  window.addEventListener('scroll', function(){
    if(window.scrollY > 60){
      nav.style.background = 'rgba(13,13,13,0.92)';
      nav.style.backdropFilter = 'blur(10px)';
      nav.style.borderBottom = '0.5px solid rgba(255,255,255,0.07)';
    } else {
      nav.style.background = 'transparent';
      nav.style.backdropFilter = '';
      nav.style.borderBottom = '';
    }
  });
})();
</script>
