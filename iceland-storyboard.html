<html lang="en">
<head>
<meta charset="UTF-8">

<title>Iceland — Visual Storyboard — The Bald Dude Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0d0d0d;
  --surface:#141414;
  --surface2:#1a1a1a;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --accent:#ff4f42;
  --white:#f5f4f0;
  --mid:rgba(245,244,240,.45);
  --dim:rgba(245,244,240,.18);
  --mono:'DM Mono',monospace;
  --sans:'Open Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:var(--sans);overflow-x:hidden;cursor:none;font-size:15px;line-height:1.7}

/* HUD CURSOR */
#hud-cursor{position:fixed;width:48px;height:48px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);opacity:1;transition:opacity .15s}
#hud-cursor svg{width:100%;height:100%;overflow:visible}
#hud-cursor .c-tl,#hud-cursor .c-tr,#hud-cursor .c-bl,#hud-cursor .c-br,#hud-cursor .c-at,#hud-cursor .c-ab{transition:transform .22s cubic-bezier(.2,0,.3,1)}
#hud-cursor.hovering .c-tl{transform:translate(-3px,-3px)}
#hud-cursor.hovering .c-tr{transform:translate(3px,-3px)}
#hud-cursor.hovering .c-bl{transform:translate(-3px,3px)}
#hud-cursor.hovering .c-br{transform:translate(3px,3px)}
#hud-cursor.hovering .c-at{transform:translateY(-3px)}
#hud-cursor.hovering .c-ab{transform:translateY(3px)}
#hud-cursor.clicking .c-tl{transform:translate(6px,6px)}
#hud-cursor.clicking .c-tr{transform:translate(-6px,6px)}
#hud-cursor.clicking .c-bl{transform:translate(6px,-6px)}
#hud-cursor.clicking .c-br{transform:translate(-6px,-6px)}
#hud-cursor.clicking .c-at{transform:translateY(5px)}
#hud-cursor.clicking .c-ab{transform:translateY(-5px)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2.5rem;transition:background .3s}
nav.scrolled{background:rgba(13,13,13,.92);backdrop-filter:blur(10px);border-bottom:.5px solid var(--border)}
.nav-logo{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,244,240,.6);text-decoration:none;transition:color .2s}
.nav-logo:hover{color:var(--white)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:rgba(245,244,240,.28);transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-links a.active{color:var(--accent)}
.nav-book{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:rgba(245,244,240,.5);border-bottom:1px solid rgba(255,79,66,.4);padding-bottom:1px;transition:color .2s,border-color .2s}
.nav-book:hover{color:var(--white);border-color:var(--white)}
.ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:0}
.ham span{display:block;width:22px;height:1px;background:rgba(245,244,240,.55)}

/* PAGE HEADER */
.guide-header{
  padding:8rem 2.5rem 3rem;
  border-bottom:.5px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-end;gap:2rem;
}
.gh-left{}
.gh-eye{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:.75rem;display:flex;align-items:center;gap:1rem}
.gh-eye::before{content:'';width:20px;height:1px;background:var(--accent)}
.gh-title{font-family:var(--sans);font-size:clamp(2rem,5vw,4.5rem);font-weight:300;line-height:1;letter-spacing:-.02em;color:var(--white)}
.gh-title em{font-style:italic}
.gh-meta{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);text-align:right;line-height:2.2;flex-shrink:0}

/* GUIDE CONTENT WRAPPER */
.guide-content{
  max-width:900px;
  margin:0 auto;
  padding:4rem 2.5rem 6rem;
}

/* TYPOGRAPHY RESETS FOR GUIDE CONTENT */
.guide-content h1,.guide-content h2,.guide-content h3,.guide-content h4{
  font-family:var(--sans);font-weight:300;color:var(--white);
  letter-spacing:-.01em;margin:2.5rem 0 1rem;line-height:1.15;
}
.guide-content h1{font-size:clamp(2rem,4vw,3.5rem);font-style:italic;margin-top:0}
.guide-content h2{font-size:clamp(1.4rem,3vw,2.25rem);padding-top:1rem;border-top:.5px solid var(--border);margin-top:3rem}
.guide-content h3{font-size:clamp(1.1rem,2.5vw,1.5rem);color:rgba(245,244,240,.85)}
.guide-content h4{font-size:1rem;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:400;font-style:normal}
.guide-content p{color:var(--mid);line-height:1.85;margin-bottom:1.25rem;font-size:14px;font-weight:300}
.guide-content strong{color:var(--white);font-weight:400}
.guide-content em{color:rgba(245,244,240,.7);font-style:italic}
.guide-content ul,.guide-content ol{color:var(--mid);padding-left:1.5rem;margin-bottom:1.25rem;font-size:14px;font-weight:300}
.guide-content li{margin-bottom:.4rem;line-height:1.7}
.guide-content code{font-family:var(--mono);font-size:12px;background:var(--surface2);padding:.15rem .4rem;color:var(--accent)}
.guide-content pre{background:var(--surface2);padding:1.25rem;overflow-x:auto;margin-bottom:1.5rem;border-left:2px solid var(--accent)}
.guide-content pre code{background:transparent;padding:0}
.guide-content blockquote{border-left:2px solid var(--accent);padding:.75rem 1.25rem;margin:1.5rem 0;font-style:italic;color:var(--mid)}
.guide-content hr{border:none;border-top:.5px solid var(--border);margin:2.5rem 0}
.guide-content table{width:100%;border-collapse:collapse;margin-bottom:1.5rem;font-size:13px;font-family:var(--mono)}
.guide-content th{text-align:left;padding:.6rem 1rem;border-bottom:1px solid var(--border2);font-weight:400;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.guide-content td{padding:.6rem 1rem;border-bottom:.5px solid var(--border);color:var(--mid)}
.guide-content tr:hover td{color:var(--white)}
.guide-content img{max-width:100%;display:block;margin:2rem auto}
.guide-content a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(255,79,66,.3);transition:border-color .2s}
.guide-content a:hover{border-color:var(--accent)}

/* SVG/DIAGRAM CONTAINERS */
.guide-content svg{max-width:100%;height:auto;display:block;margin:2rem auto}
.guide-content .diagram,.guide-content .lighting-diagram,.guide-content [class*="diagram"],[class*="setup"],[class*="layout"]{
  background:var(--surface);border:.5px solid var(--border);padding:1.5rem;margin:2rem 0;overflow:auto;
}

/* Stat/spec blocks */
.guide-content .spec-block,.guide-content .setup,.guide-content .card,.guide-content .setup-card{
  background:var(--surface);border:.5px solid var(--border);padding:1.25rem 1.5rem;margin:1rem 0;
}
.guide-content .label,.guide-content .step-label,.guide-content .tag{
  font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);
}
.guide-content .note,.guide-content .tip{
  background:var(--surface2);border-left:2px solid var(--accent);
  padding:.75rem 1.25rem;margin:1.25rem 0;font-size:13px;color:var(--mid);font-family:var(--mono);
}

/* PAGE FOOTER */
.guide-footer{padding:2.5rem 2.5rem;border-top:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.gf-link{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,244,240,.28);text-decoration:none;transition:color .2s}
.gf-link:hover{color:var(--white)}
.gf-copy{font-family:var(--mono);font-size:9px;color:rgba(245,244,240,.1);letter-spacing:.1em}

@media(max-width:900px){
  nav{padding:1.25rem 1.5rem}
  .nav-links,.nav-book{display:none}
  .ham{display:flex}
  .guide-header{flex-direction:column;align-items:flex-start;padding:7rem 1.5rem 2.5rem}
  .gh-meta{text-align:left}
  .guide-content{padding:3rem 1.5rem 5rem}
  .guide-footer{padding:2rem 1.5rem;flex-direction:column;gap:1rem;text-align:center}
}


  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0b;
    --surface: #111114;
    --border: #1e1e24;
    --accent: #e8d5a3;
    --accent2: #c47b4a;
    --text: #d4cfc8;
    --muted: #5a5a65;
    --white: #f0ede8;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }
  header {
    padding: 48px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }
  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 7vw, 96px);
    letter-spacing: 0.04em;
    color: var(--white);
    line-height: 0.9;
  }
  .header-left .subtitle {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .header-right { text-align: right; flex-shrink: 0; }
  .header-right .stat {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .header-right .stat span {
    color: var(--accent);
    font-size: 28px;
    display: block;
    line-height: 1;
  }
  .timeline-bar {
    padding: 0 48px;
    margin: 24px 0;
    display: flex;
    align-items: center;
    height: 4px;
  }
  .tl-segment {
    height: 4px;
    flex: 1;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }
  .tl-segment.active { background: var(--accent); }
  .tl-segment:hover { background: var(--accent2); }
  .tl-segment + .tl-segment { margin-left: 2px; }
  .grid {
    padding: 0 48px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .shot-card {
    background: var(--bg);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .shot-card:hover { z-index: 10; }
  .shot-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: #05050a;
  }
  .shot-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s;
    filter: saturate(0.85) brightness(0.9);
    display: block;
  }
  .shot-card:hover .shot-img {
    transform: scale(1.06);
    filter: saturate(1.05) brightness(1.0);
  }
  .timecode {
    position: absolute;
    top: 10px;
    left: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--white);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    padding: 3px 7px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .shot-number {
    position: absolute;
    top: 10px;
    right: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .overlay-text {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 12px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .shot-card:hover .overlay-text { opacity: 1; transform: translateY(0); }
  .shot-info { padding: 14px 16px 16px; border-top: 1px solid var(--border); }
  .shot-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.06em;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .shot-desc { font-size: 9.5px; line-height: 1.6; color: var(--muted); font-weight: 300; }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    backdrop-filter: blur(8px);
    padding: 40px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; align-items: center; justify-content: center; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    max-width: 960px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr;
    position: relative;
  }
  .modal-img-side { position: relative; overflow: hidden; aspect-ratio: 16/9; }
  .modal-img-side img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal-content {
    padding: 32px 40px 40px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 24px;
    align-items: start;
  }
  .shot-num-lg {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: var(--border);
    line-height: 1;
    letter-spacing: 0.02em;
  }
  .modal-text .modal-tc {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .modal-text .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--white);
    letter-spacing: 0.04em;
    margin-bottom: 12px;
    line-height: 1;
  }
  .modal-text .modal-desc { font-size: 13px; line-height: 1.8; color: var(--text); font-weight: 300; }
  .modal-caption {
    grid-column: 1 / -1;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s;
  }
  .modal-close:hover { color: var(--white); border-color: var(--white); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    header { padding: 24px; flex-direction: column; align-items: flex-start; }
    .grid { padding: 0 0 80px; grid-template-columns: 1fr; }
    .timeline-bar { padding: 0 24px; }
  }

</style>
</head>

    <g class="c-tr"><path d="M36,2 L46,2 L46,12" stroke-width="1.8" stroke-linecap="square"/></g>
    <g class="c-bl"><path d="M2,36 L2,46 L12,46" stroke-width="1.8" stroke-linecap="square"/></g>

<script>
const apt=document.getElementById('hud-cursor');
let mx=window.innerWidth/2,my=window.innerHeight/2,ax=mx,ay=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function a(){ax+=(mx-ax)*.16;ay+=(my-ay)*.16;apt.style.left=Math.round(ax)+'px';apt.style.top=Math.round(ay)+'px';requestAnimationFrame(a)})();
document.addEventListener('mousedown',()=>apt.classList.add('clicking'));
document.addEventListener('mouseup',()=>apt.classList.remove('clicking'));
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',()=>apt.classList.add('hovering'));
  el.addEventListener('mouseleave',()=>apt.classList.remove('hovering'));
});
document.addEventListener('mouseleave',()=>{apt.style.opacity='0'});
document.addEventListener('mouseenter',()=>{apt.style.opacity='1'});
window.addEventListener('scroll',()=>document.getElementById('mainNav').classList.toggle('scrolled',scrollY>60));
function toggleMobile(){
  const ul=document.querySelector('.nav-links');
  const bk=document.querySelector('.nav-book');
  const open=ul.style.display==='flex';
  ul.style.cssText=open?'':'display:flex;flex-direction:column;position:fixed;top:65px;left:0;right:0;padding:2rem;background:rgba(13,13,13,.97);backdrop-filter:blur(8px);border-bottom:.5px solid rgba(255,255,255,.06);z-index:99;gap:1.5rem';
  if(bk)bk.style.display=open?'':'none';
}
</script>
